<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VXART Deals</title>

  <script src="links.js"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: #111;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      background: #000;
      color: white;
      padding: 35px;
      border-radius: 24px;
      max-width: 360px;
      width: 85%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      color: #ffcc00;
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #ddd;
      font-size: 16px;
    }

    .loader {
      width: 45px;
      height: 45px;
      border: 5px solid #333;
      border-top: 5px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 25px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .aviso {
      font-size: 12px;
      color: #aaa;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>VXART Deals</h1>
    <p>Redirecionando para a oferta...</p>
    <div class="loader"></div>
    <p class="aviso">Alguns links podem gerar comissão sem custo extra para você.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const produto = params.get("p");

    if (produto && links[produto]) {
      setTimeout(() => {
        window.location.href = links[produto];
      }, 1200);
    } else {
      document.querySelector("p").innerText = "Oferta não encontrada.";
      document.querySelector(".loader").style.display = "none";
    }
  </script>

</body>
</html>
